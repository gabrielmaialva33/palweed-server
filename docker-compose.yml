services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    restart: unless-stopped
    container_name: palworld-server
    stop_grace_period: 30s
    ports:
      - "${PORT}:${PORT}/udp"          # Game port
      - "${QUERY_PORT}:${QUERY_PORT}/udp"   # Steam query port
    # RCON is deprecated by the game server; management runs via the REST API
    # (kept internal, port 8212 not published). RCON left disabled in .env.
    # All variables come from .env (injected via env_file).
    # No need to repeat each var here: env_file injects everything into the container.
    env_file:
      - .env
    volumes:
      - ./palworld:/palworld/
