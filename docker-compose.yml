services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    restart: unless-stopped
    container_name: palworld-server
    stop_grace_period: 30s
    ports:
      - "${PORT}:${PORT}/udp"          # Game port
      - "${QUERY_PORT}:${QUERY_PORT}/udp"   # Steam query port
      - "${RCON_PORT}:${RCON_PORT}/tcp"     # RCON (admin remoto)
    # Todas as variaveis vem do .env (injetadas via env_file).
    # Nao repetir cada var aqui: env_file ja injeta tudo no container.
    env_file:
      - .env
    volumes:
      - ./palworld:/palworld/
